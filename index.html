        async function switchQuality(e) {
            if(e) e.stopPropagation();
            if (currentIndex === -1 || playQueue.length === 0) return;
            
            const qualitySpan = document.getElementById('p-quality');
            if(!qualitySpan) return;

            const cycle = [7, 8, 10, 14];
            let idx = cycle.indexOf(currentQualityId);
            if(idx === -1) idx = 3; 
            currentQualityId = cycle[(idx + 1) % cycle.length];
            
            const mid = playQueue[currentIndex].mid;
            const currentTime = audio.currentTime;
            const wasPlaying = isPlaying;
            const originalText = qualitySpan.innerText;
            
            qualitySpan.innerText = '切换中...';
            qualitySpan.style.opacity = '0.7';
            qualitySpan.style.pointerEvents = 'none';

            try {
                const res = await fetch(`${API_BASE}?mid=${mid}&quality=${currentQualityId}`);
                const json = await res.json();
                
                if (json.code === 200 && json.data && json.data.url) {
                    currentSongUrl = json.data.url;
                    audio.src = currentSongUrl;
                    audio.currentTime = currentTime; 
                    if (wasPlaying) audio.play();
                    qualitySpan.innerText = json.data.quality || '未知音质';
                } else {
                    showToast('抱歉，该音质可能因版权或VIP限制不可用，已为您跳过');
                    qualitySpan.innerText = originalText;
                }
            } catch (err) {
                showToast('网络异常，请重试');
                qualitySpan.innerText = originalText;
            } finally {
                qualitySpan.style.opacity = '1';
                qualitySpan.style.pointerEvents = 'auto';
            }
        }

        async function playSong(mid, index = -1) {
            if(index !== -1) currentIndex = index;
            isUserScrolling = false; 
            try {
                let res = await fetch(`${API_BASE}?mid=${mid}&quality=${currentQualityId}`);
                let json = await res.json();
                
                if (json.code === 200 && json.data && json.data.quality && json.data.quality.includes('杜比')) {
                    res = await fetch(`${API_BASE}?mid=${mid}&quality=10`);
                    json = await res.json();
                }

                if ((!json || json.code !== 200 || !json.data || !json.data.url) && currentQualityId !== 7) {
                    res = await fetch(`${API_BASE}?mid=${mid}&quality=7`);
                    json = await res.json();
                }

                if (json.code === 200 && json.data && json.data.url) {
                    const song = json.data;
                    currentSongUrl = song.url;
                    currentSongName = `${song.singer} - ${song.song}`;
                    
                    document.getElementById('p-title').innerText = song.song;
                    const fTitleMb = document.getElementById('f-title-mb');
                    if(fTitleMb) fTitleMb.innerText = `${song.song} - ${song.singer}`;
                    
                    const qualitySpan = document.getElementById('p-quality');
                    qualitySpan.style.display = 'inline-block';
                    qualitySpan.innerText = song.quality || '标准音质';
                    qualitySpan.title = "点击切换音质"; 
                    qualitySpan.onclick = switchQuality; 
                    
                    document.getElementById('p-singer').innerHTML = `${song.singer} &nbsp;`;
                    document.getElementById('p-singer').appendChild(qualitySpan);
                    
                    coverImg.src = song.cover;
                    const fCoverMb = document.getElementById('f-cover-mb');
                    if(fCoverMb) fCoverMb.src = song.cover;
                    
                    audio.src = song.url;
                    audio.play();
                    isPlaying = true;
                    updatePlayState();
                    fetchLyrics(mid);
                    switchTab('player');

                    renderQueue();
                } else {
                    const errorSongName = playQueue[currentIndex]?.song || '未知歌曲';
                    showToast(`抱歉，《${errorSongName}》因版权限制无法获取音源，已自动为您跳过`);
                    setTimeout(() => {
                        nextSong();
                    }, 1500);
                }
            } catch (e) { 
                showToast('请求超时，请重试'); 
            }
        }

        function togglePlay() {
            if (!audio.src) return;
            if (isPlaying) audio.pause();
            else audio.play();
            isPlaying = !isPlaying;
            updatePlayState();
        }

        function updatePlayState() {
            const svgPlay = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            const svgPause = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            
            const btnMb = document.getElementById('play-pause-btn-mb');
            const btnPc = document.getElementById('play-pause-btn-pc');
            if(btnMb) btnMb.innerHTML = isPlaying ? svgPause : svgPlay;
            if(btnPc) btnPc.innerHTML = isPlaying ? svgPause : svgPlay;
            
            const fCoverMb = document.getElementById('f-cover-mb');
            if (isPlaying) { 
                coverImg.classList.add('playing'); 
                if(fCoverMb) fCoverMb.classList.add('playing'); 
            } else { 
                coverImg.classList.remove('playing'); 
                if(fCoverMb) fCoverMb.classList.remove('playing'); 
            }
        }

            '<svg viewBox="0 0 24 24" style="fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path><path d="M11 10h1v4"></path></svg>', 
            '<svg viewBox="0 0 24 24" style="fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>' 
        ];
        const modeNames = ['列表循环', '单曲循环', '随机播放'];

        function toggleMode() {
            currentMode = (currentMode + 1) % 3;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.innerHTML = modeIcons[currentMode];
                btn.title = modeNames[currentMode]; 
            });
            showToast(`已切换至: ${modeNames[currentMode]}`); 
        }

        function prevSong() {
            if(playQueue.length === 0) return;
            if (currentMode === 2) currentIndex = Math.floor(Math.random() * playQueue.length);
            else currentIndex = (currentIndex - 1 + playQueue.length) % playQueue.length;
            playSong(playQueue[currentIndex].mid, currentIndex);
        }

        function nextSong() {
            if(playQueue.length === 0) return;
            if (currentMode === 1) { audio.currentTime = 0; audio.play(); return; }
            if (currentMode === 2) currentIndex = Math.floor(Math.random() * playQueue.length);
            else currentIndex = (currentIndex + 1) % playQueue.length;
            playSong(playQueue[currentIndex].mid, currentIndex);
        }

        let isDraggingProgress = false;

        function calculateProgress(clientX) {
            const bar = window.innerWidth >= 850 ? document.getElementById('progress-bar-pc') : document.getElementById('progress-bar-mb');
            if(!bar) return 0;
            const rect = bar.getBoundingClientRect();
            let percent = (clientX - rect.left) / rect.width;
            return Math.max(0, Math.min(1, percent));
        }

        function updateProgressVisual(percent) {
            const pMb = document.getElementById('progress-inner-mb');
            const pPc = document.getElementById('progress-inner-pc');
            if(pMb) pMb.style.width = `${percent * 100}%`;
            if(pPc) pPc.style.width = `${percent * 100}%`;
            
            if (audio.duration) {
                const t = formatTime(percent * audio.duration);
                const tcMb = document.getElementById('time-current-mb');
                const tcPc = document.getElementById('time-current-pc');
                if(tcMb) tcMb.innerText = t;
                if(tcPc) tcPc.innerText = t;
            }
        }

        ['progress-bar-mb', 'progress-bar-pc'].forEach(id => {
            const bar = document.getElementById(id);
            if(bar) {
                bar.addEventListener('mousedown', (e) => { 
                    isDraggingProgress = true; 
                    updateProgressVisual(calculateProgress(e.clientX)); 
                });
                bar.addEventListener('touchstart', (e) => { 
                    isDraggingProgress = true; 
                    updateProgressVisual(calculateProgress(e.touches[0].clientX)); 
                }, {passive: true});
                bar.addEventListener('click', (e) => { 
                    if (!audio.duration) return;
                    const percent = calculateProgress(e.clientX);
                    audio.currentTime = percent * audio.duration;
                    updateProgressVisual(percent);
                });
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingProgress) updateProgressVisual(calculateProgress(e.clientX));
        });
        document.addEventListener('mouseup', (e) => {
            if (isDraggingProgress) {
                isDraggingProgress = false;
                if (audio.duration) audio.currentTime = calculateProgress(e.clientX) * audio.duration;
            }
        });
        document.addEventListener('touchmove', (e) => {
            if (isDraggingProgress) updateProgressVisual(calculateProgress(e.touches[0].clientX));
        }, {passive: true});
        document.addEventListener('touchend', (e) => {
            if (isDraggingProgress) {
                isDraggingProgress = false;
                if (audio.duration) audio.currentTime = calculateProgress(e.changedTouches[0].clientX) * audio.duration;
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration || isDraggingProgress) return;
            const current = audio.currentTime;
            const total = audio.duration;
            const percent = current / total;
            
            const pMb = document.getElementById('progress-inner-mb');
            const pPc = document.getElementById('progress-inner-pc');
            if(pMb) pMb.style.width = `${percent * 100}%`;
            if(pPc) pPc.style.width = `${percent * 100}%`;
            
            const t = formatTime(current);
            const tcMb = document.getElementById('time-current-mb');
            const tcPc = document.getElementById('time-current-pc');
            if(tcMb) tcMb.innerText = t;
            if(tcPc) tcPc.innerText = t;

            const d = formatTime(total);
            const ttMb = document.getElementById('time-total-mb');
            const ttPc = document.getElementById('time-total-pc');
            if(ttMb) ttMb.innerText = d;
            if(ttPc) ttPc.innerText = d;

            syncLyric(current);
        });

        audio.addEventListener('ended', nextSong);

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        const volBar = document.getElementById('vol-bar-pc');
        const volInner = document.getElementById('vol-inner-pc');
        let isDraggingVol = false;

        if(volBar) {
            audio.volume = 1;
            volInner.style.width = '100%';

            function updateVolume(clientX) {
                const rect = volBar.getBoundingClientRect();
                let percent = (clientX - rect.left) / rect.width;
                percent = Math.max(0, Math.min(1, percent));
                audio.volume = percent;
                volInner.style.width = `${percent * 100}%`;
            }

            volBar.addEventListener('mousedown', (e) => {
                isDraggingVol = true;
                updateVolume(e.clientX);
            });
            document.addEventListener('mousemove', (e) => {
                if (isDraggingVol) updateVolume(e.clientX);
            });
            document.addEventListener('mouseup', () => {
                isDraggingVol = false;
            });
            volBar.addEventListener('touchstart', (e) => {
                isDraggingVol = true;
                updateVolume(e.touches[0].clientX);
            }, {passive: true});
            document.addEventListener('touchmove', (e) => {
                if (isDraggingVol) updateVolume(e.touches[0].clientX);
            }, {passive: true});
            document.addEventListener('touchend', () => {
                isDraggingVol = false;
            });
        }

        async function fetchLyrics(mid) {
            try {
                const res = await fetch(`${API_BASE}/lyric?mid=${mid}`);
                const json = await res.json();
                if (json.code === 200 && json.data && json.data.lrc) {
                    const lrcLines = parseLrc(json.data.lrc);
                    let transLines = json.data.trans ? parseLrc(json.data.trans) : [];
                    const mergedLyrics = lrcLines.map(lrc => {
                        const trans = transLines.find(t => Math.abs(t.time - lrc.time) < 1);
                        return { time: lrc.time, main: lrc.text, trans: trans ? trans.text : '' };
                    });
                    lyricsArray = mergedLyrics;
                    currentLyricIndex = -1; 
                    lyricContainer.classList.remove('no-scroll'); 
                    lyricContainer.innerHTML = lyricsArray.map((l, i) => `
                        <div class="lyric-line-group" id="lrc-${i}" onclick="audio.currentTime=${l.time}; audio.play(); isPlaying=true; updatePlayState();">
                            <div class="lyric-line-main">${l.main}</div>
                            ${l.trans ? `<div class="lyric-line-trans">${l.trans}</div>` : ''}
                        </div>
                    `).join('');
                } else {
                    lyricsArray = []; currentLyricIndex = -1; 
                    lyricContainer.classList.add('no-scroll'); 
                    lyricContainer.innerHTML = '<div class="lyric-line-group active"><div class="lyric-line-main">此歌曲暂无歌词</div></div>';
                }
            } catch (e) {
                lyricsArray = []; currentLyricIndex = -1; 
                lyricContainer.classList.add('no-scroll'); 
                lyricContainer.innerHTML = '<div class="lyric-line-group active"><div class="lyric-line-main">歌词加载失败</div></div>';
            }
        }

        function parseLrc(lrcStr) {
            const result = [];
            lrcStr.split('\n').forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseFloat("0." + match[3]);
                    const text = match[4].replace(/\/\//g, '').trim(); 
                    if(text) result.push({ time, text });
                }
            });
            return result;
        }

        function handleLyricInteraction() {
            if (!lyricsArray || lyricsArray.length === 0) return;
            isUserScrolling = true;
            lyricSeekLine.classList.add('show');
            resetLyricScrollTimeout();
        }

        function resetLyricScrollTimeout() {
            clearTimeout(lyricScrollTimeout);
            lyricScrollTimeout = setTimeout(() => {
                isUserScrolling = false;
                lyricSeekLine.classList.remove('show');
                syncLyric(audio.currentTime, true); 
            }, 2500);
        }

        lyricContainer.addEventListener('touchstart', handleLyricInteraction, {passive: true});
        lyricContainer.addEventListener('mousedown', handleLyricInteraction, {passive: true});
        lyricContainer.addEventListener('wheel', handleLyricInteraction, {passive: true});
        lyricContainer.addEventListener('touchmove', handleLyricInteraction, {passive: true});

        lyricContainer.addEventListener('scroll', () => {
            if (!isUserScrolling || lyricsArray.length === 0) return;
            resetLyricScrollTimeout();

            const containerRect = lyricContainer.getBoundingClientRect();
            const containerCenter = containerRect.top + containerRect.height / 2;
            let closestIndex = 0; let minDiff = Infinity;
            
            const lines = lyricContainer.querySelectorAll('.lyric-line-group');
            lines.forEach((line, index) => {
                const rect = line.getBoundingClientRect();
                const lineCenter = rect.top + rect.height / 2;
                const diff = Math.abs(lineCenter - containerCenter);
                if (diff < minDiff) { minDiff = diff; closestIndex = index; }
            });

            if (lyricsArray[closestIndex]) {
                seekTargetTime = lyricsArray[closestIndex].time;
                lyricSeekTime.innerText = formatTime(seekTargetTime);
                lines.forEach(el => el.style.opacity = ''); 
                if(lines[closestIndex]) lines[closestIndex].style.opacity = '1';
            }
        });

        window.jumpToSeekTime = function() {
            if (seekTargetTime >= 0) {
                audio.currentTime = seekTargetTime;
                if (!isPlaying) togglePlay();
                isUserScrolling = false;
                lyricSeekLine.classList.remove('show');
                syncLyric(audio.currentTime, true); 
            }
        };

        function syncLyric(currentTime, forceScroll = false) {
            if (lyricsArray.length === 0) return;
            let activeIndex = 0;
            for (let i = 0; i < lyricsArray.length; i++) {
                if (currentTime + 0.3 >= lyricsArray[i].time) { activeIndex = i; } else { break; }
            }
            if (currentLyricIndex !== activeIndex || forceScroll) {
                currentLyricIndex = activeIndex;
                document.querySelectorAll('.lyric-line-group').forEach((el, index) => {
                    if (index === activeIndex) { el.classList.add('active'); } else { el.classList.remove('active'); }
                    if(!isUserScrolling) el.style.opacity = ''; 
                });
                const activeEl = document.getElementById(`lrc-${activeIndex}`);
                if (activeEl && !isUserScrolling) { activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }
        }

        async function playMV(vid, title) {
            if(isPlaying) togglePlay(); 
            const modal = document.getElementById('mv-modal');
            const video = document.getElementById('mv-video');
            document.getElementById('mv-title').innerText = title + ' - 官方 MV';
            modal.classList.add('show');
            try {
                const res = await fetch(`${API_BASE}/mv?vid=${vid}&type=mp4`); 
                const json = await res.json();
                if(json.code === 200 && json.data && json.data.urls && json.data.urls.length > 0) {
                    const bestUrl = json.data.urls[json.data.urls.length - 1].url;
                    video.src = bestUrl;
                    video.play();
                } else {
                    showToast('获取 MV 源失败，请稍后再试。');
                    closeMV();
                }
            } catch(e) { showToast('网络请求错误，无法播放 MV。'); closeMV(); }
        }

        function closeMV() {
            const modal = document.getElementById('mv-modal');
            const video = document.getElementById('mv-video');
            video.pause(); video.src = "";
            modal.classList.remove('show');
        }

        function downloadCurrentSong() {
            if (!currentSongUrl) {
                showToast('🎵 请先播放一首歌曲后再点击下载哦！'); return;
            }
            let ext = '.mp3';
            try {
                const urlObj = new URL(currentSongUrl);
                const pathMatches = urlObj.pathname.match(/\.([a-zA-Z0-9]+)$/);
                if (pathMatches) ext = '.' + pathMatches[1];
            } catch (e) {}
            const filename = `${currentSongName}${ext}`;
            const a = document.createElement('a');
            a.href = currentSongUrl; a.download = filename; a.target = '_blank';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function toggleQueue() {
            if (window.innerWidth >= 850) {
                switchTab('player'); 
            } else {
                const modal = document.getElementById('queue-modal');
                modal.classList.toggle('show');
                if(modal.classList.contains('show')) { renderQueue(); }
            }
        }

        function renderQueue() {
            const mContainer = document.getElementById('queue-list-container');
            const dContainer = document.getElementById('queue-list-desktop');
            document.getElementById('queue-count').innerText = playQueue.length;
            
            // 移动端渲染
            if(mContainer) {
                if(playQueue.length === 0) {
                    mContainer.innerHTML = '<div class="empty-state" style="margin-top:30px; font-size:13px;">队列为空</div>';
                } else {
                    mContainer.innerHTML = playQueue.map((song, i) => `
                        <li class="queue-item ${i === currentIndex ? 'active' : ''}" onclick="playSong('${song.mid}', ${i})">
                            <div class="q-info"><span class="q-title">${song.song}</span><span class="q-singer">${song.singer}</span></div>
                            ${i === currentIndex ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="var(--primary)" style="margin-right:8px;"><path d="M8 5v14l11-7z"/></svg>' : ''}
                            <button class="queue-remove-btn" onclick="openSongMenu(event, 'queue', ${i})" title="更多操作" style="font-size:20px; font-weight:bold; width:30px; text-align:center;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="12" cy="19" r="2"></circle></svg>
                            </button>
                        </li>
                    `).join('');
                    setTimeout(() => {
                        const activeItem = mContainer.querySelector('.queue-item.active');
                        if(activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            }

            // PC端渲染
            if(dContainer) {
                if(playQueue.length === 0) {
                    dContainer.innerHTML = '<div class="empty-state" style="margin-top:10vh;">当前播放队列为空</div>';
                } else {
                    dContainer.innerHTML = playQueue.map((song, i) => {
                        const isActive = i === currentIndex;
                        const colorStyle = isActive ? 'color: var(--primary); font-weight: bold;' : '';
                        const titleColor = isActive ? 'color: var(--primary);' : '';
                        const titlePrefix = isActive ? '<span style="color:var(--primary);margin-right:8px;">▶</span>' : '';
                        const safeSinger = song.singer.replace(/'/g, "\\'");
                        const safeSongName = song.song.replace(/'/g, "\\'");
                        const safeAlbum = song.album ? song.album.replace(/'/g, "\\'") : '';
                        const mvTag = song.vid ? `<span class="mv-badge" onclick="event.stopPropagation(); playMV('${song.vid}', '${safeSongName}')">▶ MV</span>` : '';
                        
                        return `
                        <li class="song-item" onclick="playSong('${song.mid}', ${i})">
                            <div class="song-item-info">
                                <div class="song-item-title" style="${titleColor}">${titlePrefix}${song.song} ${mvTag}</div>
                            </div>
                            <div class="desktop-singer desktop-singer-wrapper" style="${colorStyle}">
                                <svg class="singer-search-icon" onclick="searchSinger(event, '${safeSinger}')" viewBox="0 0 24 24" width="14" height="14">
                                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                                </svg>
                                <span class="desktop-singer-text">${song.singer}</span>
                            </div>
                            <div class="desktop-album" title="${song.album || '未知'}">
                                <svg class="singer-search-icon" onclick="searchSinger(event, '${safeAlbum}')" viewBox="0 0 24 24" width="14" height="14">
                                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                                </svg>
                                <span class="desktop-album-text">${song.album || '未知'}</span>
                            </div>
                            <div class="song-action-col">
                                <button class="queue-remove-btn" onclick="openSongMenu(event, 'queue', ${i})" title="更多操作" style="font-size:20px; font-weight:bold; width:30px; text-align:center;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="12" cy="19" r="2"></circle></svg>
                                </button>
                            </div>
                        </li>`;
                    }).join('');
                }
            }
        }

        function removeFromQueue(index, event) {
            if(event && event.stopPropagation) event.stopPropagation(); 
            playQueue.splice(index, 1);
            if (index < currentIndex) {
                currentIndex--;
            } else if (index === currentIndex) {
                if (playQueue.length > 0) {
                    if (currentIndex >= playQueue.length) { currentIndex = 0; }
                    playSong(playQueue[currentIndex].mid, currentIndex);
                } else {
                    audio.pause(); audio.src = ''; isPlaying = false; updatePlayState(); currentIndex = -1;
                    document.getElementById('p-title').innerText = "QQmusic Player";
                    const fTitleMb = document.getElementById('f-title-mb');
                    if(fTitleMb) fTitleMb.innerText = "等待播放...";
                    document.getElementById('p-singer').innerHTML = '等待播放... <span class="quality-badge" style="display:none;" id="p-quality"></span>';
                    const defaultCover = 'https://y.qq.com/mediastyle/global/img/album_300.png';
                    coverImg.src = defaultCover; 
                    const fCoverMb = document.getElementById('f-cover-mb');
                    if(fCoverMb) fCoverMb.src = defaultCover; 
                    lyricsArray = []; lyricContainer.innerHTML = '<div class="lyric-line-group active"><div class="lyric-line-main">歌词将在此震撼显示</div></div>';
                    
                    const daTitle = document.getElementById('player-da-title');
                    if(daTitle) daTitle.innerText = "当前播放队列";
                }
            }
            renderQueue(); 
        }

        // --- 桌面端搜索弹窗自由拖动逻辑 ---
        const dsModalOverlay = document.getElementById('desktop-search-overlay');
        const dsModal = document.querySelector('.ds-modal-content');
        const dsHeader = document.querySelector('.ds-header');
        
        let isDraggingDs = false;
        let startX, startY, initialLeft, initialTop;

        dsHeader.addEventListener('mousedown', (e) => {
            if (e.target.closest('.ds-close')) return;
            
            isDraggingDs = true;
            const rect = dsModal.getBoundingClientRect();
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = rect.left;
            initialTop = rect.top;
            
            dsModal.style.left = initialLeft + 'px';
            dsModal.style.top = initialTop + 'px';
            dsModal.style.transform = 'none'; 
            dsModal.style.margin = '0';
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingDs) {
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                let newLeft = initialLeft + dx;
                let newTop = initialTop + dy;
                
                newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - dsModal.offsetWidth));
                newTop = Math.max(0, Math.min(newTop, window.innerHeight - dsModal.offsetHeight));

                dsModal.style.left = newLeft + 'px';
                dsModal.style.top = newTop + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDraggingDs = false;
        });

        // 默认加载队列 (无播放)
        async function initDefaultSong() {
            try {
                const res2 = await fetch(`${API_BASE}/search/song?word=${encodeURIComponent('空悲切')}&num=1`);
                const json2 = await res2.json();
                const res1 = await fetch(`${API_BASE}/search/song?word=${encodeURIComponent('下坠falling')}&num=1`);
                const json1 = await res1.json();
                
                let queue = [];
                if (json2.code === 200 && json2.data && json2.data.length > 0) {
                    queue.push(json2.data[0]);
                }
                if (json1.code === 200 && json1.data && json1.data.length > 0) {
                    queue.push(json1.data[0]);
                }
                
                if (queue.length > 0) {
                    playQueue = queue;
                    renderQueue();
                }
            } catch(e) {}
        }
        initDefaultSong();
    </script>
</body>
</html>
