<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QQ 音乐 Web 极享版 Pro</title>
    <style>
        :root {
            --primary: #1ecc94; /* QQ音乐感的高级绿 */
            --bg-base: #0a0a0c;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(20, 20, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { color: var(--text-main); height: 100vh; overflow: hidden; background-color: var(--bg-base); }
        
        /* 沉浸式动态背景 */
        #bg-image {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.35); z-index: -1; transition: background-image 1s ease-in-out;
        }
        
        /* --- 顶部玻璃导航 --- */
        .header {
            display: flex; justify-content: center; gap: 40px; padding: 20px 0; height: 70px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            position: fixed; top: 0; width: 100%; z-index: 20;
        }
        .nav-item { font-size: 16px; color: var(--text-sub); cursor: pointer; transition: 0.3s; font-weight: 500; letter-spacing: 1px; }
        .nav-item:hover { color: #fff; }
        .nav-item.active { color: var(--text-main); font-weight: 600; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .nav-item.active::after { content: ''; display: block; width: 100%; height: 3px; background: var(--primary); margin: 6px auto 0; border-radius: 3px; box-shadow: 0 0 10px var(--primary); }

        /* --- 主播放器视图 (极简唱片机 + 滚动歌词) --- */
        .main-player {
            position: fixed; top: 70px; bottom: 100px; width: 100%;
            display: flex; flex-direction: column; align-items: center; padding: 2vh 20px; z-index: 5;
        }
        .record-wrapper { position: relative; margin: 2vh auto 3vh; }
        .record-container { width: 45vw; height: 45vw; max-width: 280px; max-height: 280px; position: relative; border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.6); background: #000; padding: 10px; }
        .cover-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); animation: rotate 24s linear infinite; animation-play-state: paused; }
        .cover-img.playing { animation-play-state: running; }
        
        .song-info { text-align: center; width: 100%; max-width: 500px; }
        .song-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .song-singer { font-size: 15px; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .quality-badge { font-size: 10px; background: rgba(255,255,255,0.15); padding: 2px 6px; border-radius: 4px; color: #ffeb3b; border: 1px solid rgba(255,235,59,0.3); }

        /* 双语动效歌词区 */
        .lyric-box {
            flex: 1; width: 100%; max-width: 600px; overflow-y: auto; text-align: center; margin-top: 20px; padding: 40px 0 80px 0;
            mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent); -webkit-mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent);
        }
        .lyric-line-group { margin-bottom: 24px; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); opacity: 0.3; cursor: pointer; transform: scale(0.95); }
        .lyric-line-group:hover { opacity: 0.7; }
        .lyric-line-group.active { opacity: 1; transform: scale(1.1); }
        .lyric-line-main { font-size: 16px; font-weight: 600; margin-bottom: 4px; transition: color 0.3s; }
        .lyric-line-trans { font-size: 14px; color: var(--primary); opacity: 0.9; }
        .lyric-line-group.active .lyric-line-main { color: var(--primary); text-shadow: 0 0 20px rgba(30, 204, 148, 0.5); }

        /* --- 交互面板 (歌单 & 搜索) --- */
        .action-panel {
            position: fixed; top: 70px; bottom: 100px; width: 100%;
            background: var(--glass-bg); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            z-index: 10; transform: translateY(100%); opacity: 0; pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s;
            display: flex; flex-direction: column;
        }
        .action-panel.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .panel-content { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; }
        .panel-content.active { display: flex; }
        
        .action-header { padding: 20px 20px 10px; border-bottom: 1px solid var(--glass-border); position: relative; }
        .input-group { display: flex; gap: 12px; position: relative; }
        .input-group input {
            flex: 1; padding: 14px 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.15); outline: none;
            background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; transition: all 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .input-group input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .input-group button {
            padding: 0 24px; border-radius: 14px; border: none; background: var(--primary);
            color: #000; font-weight: 700; cursor: pointer; font-size: 15px; box-shadow: 0 4px 15px rgba(30, 204, 148, 0.4); transition: 0.2s; white-space: nowrap;
        }
        .input-group button:active { transform: scale(0.95); }

        /* 智能提示下拉框 (Smartbox) */
        .smart-box {
            position: absolute; top: 60px; left: 0; right: 100px; background: rgba(30, 30, 35, 0.95); backdrop-filter: blur(20px);
            border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 100; display: none; max-height: 300px; overflow-y: auto; padding: 8px 0;
        }
        .smart-item { padding: 12px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .smart-item:hover { background: rgba(255,255,255,0.08); padding-left: 25px; }
        .smart-type { font-size: 11px; color: var(--primary); margin-right: 12px; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; }

        .action-body { flex: 1; overflow-y: auto; padding: 15px 20px; }
        
        /* --- 美化卡片列表 --- */
        .song-list { list-style: none; padding-bottom: 20px; }
        .song-item {
            display: flex; align-items: center; padding: 12px 15px; border-radius: 14px;
            background: rgba(255,255,255,0.03); margin-bottom: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .song-item:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-border); }
        .song-item:active { transform: scale(0.98); }
        .song-item-cover { width: 48px; height: 48px; border-radius: 8px; margin-right: 15px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .song-item-info { flex: 1; overflow: hidden; }
        .song-item-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 4px; display: flex; align-items: center; }
        .song-item-singer { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 专属 MV 标签 */
        .mv-badge { border: 1px solid var(--primary); color: var(--primary); font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-left: 8px; cursor: pointer; }
        .mv-badge:hover { background: var(--primary); color: #000; }

        .playlist-card {
            display: flex; align-items: center; background: rgba(255,255,255,0.03); 
            padding: 15px; border-radius: 16px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .playlist-card:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-border); }
        .playlist-card:active { transform: scale(0.98); }
        .playlist-card img { width: 70px; height: 70px; border-radius: 12px; margin-right: 20px; object-fit: cover; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        
        .empty-state { text-align: center; color: var(--text-sub); margin-top: 15vh; font-size: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* 加载动画 */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-bar { display: flex; align-items: center; margin-bottom: 15px; position: sticky; top: 0; background: var(--glass-bg); z-index: 5; padding: 15px 0; backdrop-filter: blur(10px); margin-top: -10px; }
        .back-btn { padding: 8px 16px; background: rgba(255,255,255,0.1); border: none; color: #fff; border-radius: 20px; cursor:pointer; margin-right: 15px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        /* --- 全局底部控制条 --- */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; 
            background: rgba(12, 12, 15, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; align-items: center; padding: 0 30px; z-index: 30; border-top: 1px solid var(--glass-border);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .footer-cover { width: 60px; height: 60px; border-radius: 10px; margin-right: 20px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .footer-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; margin-right: 20px; }
        .f-title-scroll { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
        
        .progress-container { display: flex; align-items: center; font-size: 12px; color: var(--text-sub); font-family: monospace; }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.15); margin: 0 12px; border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; transition: width 0.1s linear; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
        .ctrl-btn:hover { opacity: 1; color: var(--primary); }
        .ctrl-btn:active { transform: scale(0.85); }
        .play-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(5px); opacity: 1; border: 1px solid rgba(255,255,255,0.1); }
        .play-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        /* --- MV 全屏播放器 --- */
        .mv-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }
        .mv-modal.show { display: flex; animation: fadeIn 0.3s ease; }
        .mv-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: absolute; width: 100%; z-index: 10; }
        .mv-title { font-size: 18px; font-weight: bold; text-shadow: 0 2px 5px #000; }
        .mv-close { cursor: pointer; background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 15px; border-radius: 20px; backdrop-filter: blur(5px); transition: 0.2s; }
        .mv-close:hover { background: var(--primary); color: #000; }
        .mv-player { width: 100%; height: 100%; object-fit: contain; outline: none; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <audio id="audio-player" preload="auto"></audio>

    <div class="header">
        <div class="nav-item active" onclick="switchTab('player')" id="nav-player">正在播放</div>
        <div class="nav-item" onclick="switchTab('playlist')" id="nav-playlist">精选歌单</div>
        <div class="nav-item" onclick="switchTab('search')" id="nav-search">探索发现</div>
    </div>

    <div class="main-player" id="main-player">
        <div class="record-wrapper">
            <div class="record-container">
                <img src="https://y.qq.com/mediastyle/global/img/album_300.png" id="p-cover" class="cover-img" alt="cover">
            </div>
        </div>
        <div class="song-info">
            <div class="song-title" id="p-title">QQ 音乐 Pro</div>
            <div class="song-singer" id="p-singer">开启极致听觉盛宴 <span class="quality-badge" style="display:none;" id="p-quality"></span></div>
        </div>
        <div class="lyric-box" id="lyric-container">
            <div class="lyric-line-group active"><div class="lyric-line-main">歌词将在此震撼显示</div></div>
        </div>
    </div>

    <div class="action-panel" id="action-panel">
        
        <div class="panel-content" id="panel-playlist">
            <div class="action-header">
                <div class="input-group">
                    <input type="number" id="uin-input" placeholder="输入您的 QQ 账号..." value="1569097443">
                    <button onclick="fetchPlaylists()">提取歌单</button>
                </div>
            </div>
            <div class="action-body" id="playlist-results">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:15px; opacity:0.5;"><path d="M9 18V5l12-2v13M9 9l12-2M5 21a3 3 0 100-6 3 3 0 000 6zM17 19a3 3 0 100-6 3 3 0 000 6z"/></svg>
                    输入QQ号，一键同步您的所有收藏与自建歌单
                </div>
            </div>
        </div>

        <div class="panel-content" id="panel-search">
            <div class="action-header">
                <div class="input-group">
                    <input type="text" id="search-input" placeholder="输入你想听的歌曲、歌手、专辑..." oninput="debounceSmartbox()">
                    <button onclick="searchMusic()">立即搜索</button>
                    <div class="smart-box" id="smart-box"></div>
                </div>
            </div>
            <div class="action-body" id="search-results">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:15px; opacity:0.5;"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    连接海量曲库，随时随地发现好音乐
                </div>
            </div>
        </div>

    </div>

    <div class="footer" id="global-footer">
        <img src="https://y.qq.com/mediastyle/global/img/album_300.png" id="f-cover" class="footer-cover" alt="cover">
        <div class="footer-info">
            <div class="f-title-scroll" id="f-title">等待播放...</div>
            <div class="progress-container">
                <span id="time-current">00:00</span>
                <div class="progress-bar" id="progress-bar" onclick="seekAudio(event)">
                    <div class="progress-inner" id="progress-inner"></div>
                </div>
                <span id="time-total">00:00</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="mode-btn" onclick="toggleMode()" title="列表循环">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="prevSong()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn play-btn" id="play-pause-btn" onclick="togglePlay()">
                <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="nextSong()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <div class="mv-modal" id="mv-modal">
        <div class="mv-header">
            <div class="mv-title" id="mv-title">正在播放 MV</div>
            <button class="mv-close" onclick="closeMV()">关闭 MV</button>
        </div>
        <video class="mv-player" id="mv-video" controls></video>
    </div>

    <script>
        const API_BASE = 'https://api.vkeys.cn/v2/music/tencent';
        let playQueue = [];
        let currentIndex = -1;
        let isPlaying = false;
        let lyricsArray = [];
        let currentMode = 0; // 0:列表循环, 1:单曲循环, 2:随机
        
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-pause-btn');
        const coverImg = document.getElementById('p-cover');
        const footerCover = document.getElementById('f-cover');
        const bgImg = document.getElementById('bg-image');
        const actionPanel = document.getElementById('action-panel');
        const smartBox = document.getElementById('smart-box');
        
        // --- 1. 面板切换逻辑 ---
        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');
            smartBox.style.display = 'none';

            if (tabId === 'player') {
                actionPanel.classList.remove('show');
            } else {
                document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
                document.getElementById(`panel-${tabId}`).classList.add('active');
                actionPanel.classList.add('show');
            }
        }

        // --- 2. 智能联想 (Smartbox) ---
        let smartTimeout;
        function debounceSmartbox() {
            clearTimeout(smartTimeout);
            const word = document.getElementById('search-input').value;
            if(!word) { smartBox.style.display = 'none'; return; }
            
            smartTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_BASE}/search/smartbox?word=${encodeURIComponent(word)}`);
                    const json = await res.json();
                    if(json.code === 200 && json.data) {
                        let html = '';
                        if(json.data.song && json.data.song.itemlist) {
                            json.data.song.itemlist.forEach(i => html += `<div class="smart-item" onclick="quickSearch('${i.name} ${i.singer}')"><span class="smart-type">单曲</span>${i.name} - ${i.singer}</div>`);
                        }
                        if(json.data.singer && json.data.singer.itemlist) {
                            json.data.singer.itemlist.forEach(i => html += `<div class="smart-item" onclick="quickSearch('${i.singer}')"><span class="smart-type">歌手</span>${i.singer}</div>`);
                        }
                        smartBox.innerHTML = html;
                        smartBox.style.display = html ? 'block' : 'none';
                    }
                } catch(e) {}
            }, 300);
        }

        function quickSearch(keyword) {
            document.getElementById('search-input').value = keyword;
            smartBox.style.display = 'none';
            searchMusic();
        }

        // --- 3. 渲染歌曲列表 (支持 MV 检测) ---
        function renderSongsHTML(list) {
            if (!list || list.length === 0) return '<div class="empty-state">未能找到相关歌曲</div>';
            return `<ul class="song-list">` + list.map((song, index) => {
                const cover = song.cover || 'https://y.qq.com/mediastyle/global/img/album_300.png';
                const mvTag = song.vid ? `<span class="mv-badge" onclick="event.stopPropagation(); playMV('${song.vid}', '${song.song}')">▶ MV</span>` : '';
                return `
                <li class="song-item" onclick="playSong('${song.mid}', ${index})">
                    <img src="${cover}" class="song-item-cover" alt="cover" loading="lazy">
                    <div class="song-item-info">
                        <div class="song-item-title">${song.song} ${mvTag}</div>
                        <div class="song-item-singer">${song.singer} ${song.album ? `· ${song.album}` : ''}</div>
                    </div>
                </li>`
            }).join('') + `</ul>`;
        }

        // --- 4. 歌单核心逻辑 (重构：无感分页加载全量数据) ---
        async function fetchPlaylists() {
            const uin = document.getElementById('uin-input').value;
            if(!uin) return;
            const container = document.getElementById('playlist-results');
            container.innerHTML = '<div class="empty-state"><div class="spinner"></div>正在连接云端服务器拉取您的歌单...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/info?uin=${uin}`);
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    const lists = [...(json.data.mydiss || []), ...(json.data.likediss || [])];
                    const html = lists.map(p => `
                        <div class="playlist-card" onclick="loadPlaylistDetail('${p.id}', '${p.title}')">
                            <img src="${p.picurl || 'https://y.qq.com/mediastyle/global/img/album_300.png'}" alt="cover" loading="lazy">
                            <div>
                                <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #fff;">${p.title}</div>
                                <div style="font-size: 13px; color: var(--text-sub);">${p.song_num || p.listen_num + ' 次播放'}</div>
                            </div>
                        </div>
                    `).join('');
                    container.innerHTML = html || '<div class="empty-state">该账号未公开任何歌单，或歌单已被隐藏</div>';
                }
            } catch (e) { container.innerHTML = '<div class="empty-state">网络异常，请重试</div>'; }
        }

        // 全自动翻页引擎，彻底解决歌单显示不全的问题
        async function loadPlaylistDetail(id, title) {
            const container = document.getElementById('playlist-results');
            const uin = document.getElementById('uin-input').value; 
            container.innerHTML = '<div class="empty-state"><div class="spinner"></div>正在为您智能加载全量歌曲，请稍候...</div>';
            
            try {
                let allSongs = [];
                let page = 1;
                const limit = 60; // 选用安全的单页数量，防止服务端超时
                let hasMore = true;

                while (hasMore) {
                    const res = await fetch(`${API_BASE}/dissinfo?id=${id}&num=${limit}&page=${page}&uin=${uin}`);
                    const json = await res.json();
                    
                    if (json.code === 200 && json.data && json.data.list) {
                        allSongs = allSongs.concat(json.data.list);
                        container.innerHTML = `<div class="empty-state"><div class="spinner"></div>正在加载... 已拉取 ${allSongs.length} 首歌曲</div>`;
                        
                        // 如果当前页返回的数据少于上限，说明已经到了最后一页
                        if (json.data.list.length < limit) {
                            hasMore = false;
                        } else {
                            page++;
                        }
                    } else {
                        hasMore = false;
                        if (page === 1) throw new Error('First page fetch failed');
                    }
                }

                if (allSongs.length > 0) {
                    playQueue = allSongs;
                    const backBtn = `
                        <div class="back-bar">
                            <button class="back-btn" onclick="fetchPlaylists()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> 返回歌单
                            </button>
                            <span style="font-weight: 600; font-size: 15px;">${title || '歌单详情'} <span style="color:var(--primary)">(${allSongs.length}首)</span></span>
                        </div>`;
                    container.innerHTML = backBtn + renderSongsHTML(allSongs);
                } else {
                    container.innerHTML = `<div class="back-bar"><button class="back-btn" onclick="fetchPlaylists()">← 返回</button></div><div class="empty-state">未能获取到歌曲，可能歌单已被设为私密</div>`;
                }

            } catch (e) { 
                container.innerHTML = `<div class="back-bar"><button class="back-btn" onclick="fetchPlaylists()">← 返回</button></div><div class="empty-state">网络请求超时或无权限访问该私密歌单</div>`; 
            }
        }

        // --- 5. 搜索功能 ---
        async function searchMusic() {
            const word = document.getElementById('search-input').value;
            if (!word) return;
            smartBox.style.display = 'none';
            const container = document.getElementById('search-results');
            container.innerHTML = '<div class="empty-state"><div class="spinner"></div>云端全网深度检索中...</div>';
            try {
                const res = await fetch(`${API_BASE}/search/song?word=${encodeURIComponent(word)}&num=60`);
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    playQueue = json.data; 
                    container.innerHTML = renderSongsHTML(json.data);
                } else {
                    container.innerHTML = '<div class="empty-state">未找到相关歌曲</div>';
                }
            } catch (e) { container.innerHTML = '<div class="empty-state">搜索失败，请检查网络连接</div>'; }
        }

        // --- 6. 播放控制核心 ---
        async function playSong(mid, index = -1) {
            if(index !== -1) currentIndex = index;
            try {
                const res = await fetch(`${API_BASE}?mid=${mid}`);
                const json = await res.json();
                
                if (json.code === 200 && json.data && json.data.url) {
                    const song = json.data;
                    document.getElementById('p-title').innerText = song.song;
                    document.getElementById('f-title').innerText = `${song.song} - ${song.singer}`;
                    
                    const qualitySpan = document.getElementById('p-quality');
                    qualitySpan.style.display = 'inline-block';
                    qualitySpan.innerText = song.quality || '标准音质';
                    document.getElementById('p-singer').innerHTML = `${song.singer} &nbsp;`;
                    document.getElementById('p-singer').appendChild(qualitySpan);
                    
                    coverImg.src = song.cover;
                    footerCover.src = song.cover;
                    bgImg.style.backgroundImage = `url(${song.cover})`;
                    
                    audio.src = song.url;
                    audio.play();
                    isPlaying = true;
                    updatePlayState();
                    fetchLyrics(mid);

                    // 自动回到播放器主视图
                    switchTab('player');
                } else {
                    alert('抱歉，获取高品质音源失败，可能因数字专辑版权限制。');
                }
            } catch (e) { alert('请求超时，请重试'); }
        }

        function togglePlay() {
            if (!audio.src) return;
            if (isPlaying) audio.pause();
            else audio.play();
            isPlaying = !isPlaying;
            updatePlayState();
        }

        function updatePlayState() {
            document.getElementById('play-pause-btn').innerHTML = isPlaying 
                ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' 
                : '<svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-left:3px;"><path d="M8 5v14l11-7z"/></svg>';
            
            if (isPlaying) { coverImg.classList.add('playing'); footerCover.classList.add('playing'); } 
            else { coverImg.classList.remove('playing'); footerCover.classList.remove('playing'); }
        }

        // 播放模式切换
        const modeIcons = [
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>', // 列表循环
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3H8v2h5v2l3-3-3-3v2zm4 6h-2v9h2V9zm-8 4H7v-2H5v6h4v-4z"/><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>', // 单曲循环
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>' // 随机
        ];
        function toggleMode() {
            currentMode = (currentMode + 1) % 3;
            document.getElementById('mode-btn').innerHTML = modeIcons[currentMode];
        }

        function prevSong() {
            if(playQueue.length === 0) return;
            if (currentMode === 2) currentIndex = Math.floor(Math.random() * playQueue.length);
            else currentIndex = (currentIndex - 1 + playQueue.length) % playQueue.length;
            playSong(playQueue[currentIndex].mid, currentIndex);
        }

        function nextSong() {
            if(playQueue.length === 0) return;
            if (currentMode === 1) { audio.currentTime = 0; audio.play(); return; }
            if (currentMode === 2) currentIndex = Math.floor(Math.random() * playQueue.length);
            else currentIndex = (currentIndex + 1) % playQueue.length;
            playSong(playQueue[currentIndex].mid, currentIndex);
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const current = audio.currentTime;
            const total = audio.duration;
            document.getElementById('progress-inner').style.width = `${(current / total) * 100}%`;
            document.getElementById('time-current').innerText = formatTime(current);
            document.getElementById('time-total').innerText = formatTime(total);
            syncLyric(current);
        });

        audio.addEventListener('ended', nextSong);

        function seekAudio(e) {
            if (!audio.duration) return;
            const bar = document.getElementById('progress-bar');
            audio.currentTime = ((e.clientX - bar.getBoundingClientRect().left) / bar.getBoundingClientRect().width) * audio.duration;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- 7. 双语高亮歌词 ---
        async function fetchLyrics(mid) {
            try {
                const res = await fetch(`${API_BASE}/lyric?mid=${mid}`);
                const json = await res.json();
                const container = document.getElementById('lyric-container');
                if (json.code === 200 && json.data && json.data.lrc) {
                    const lrcLines = parseLrc(json.data.lrc);
                    let transLines = json.data.trans ? parseLrc(json.data.trans) : [];

                    const mergedLyrics = lrcLines.map(lrc => {
                        const trans = transLines.find(t => Math.abs(t.time - lrc.time) < 1);
                        return { time: lrc.time, main: lrc.text, trans: trans ? trans.text : '' };
                    });

                    lyricsArray = mergedLyrics;
                    container.innerHTML = lyricsArray.map((l, i) => `
                        <div class="lyric-line-group" id="lrc-${i}" onclick="audio.currentTime=${l.time}; audio.play(); isPlaying=true; updatePlayState();">
                            <div class="lyric-line-main">${l.main}</div>
                            ${l.trans ? `<div class="lyric-line-trans">${l.trans}</div>` : ''}
                        </div>
                    `).join('');
                } else {
                    lyricsArray = []; container.innerHTML = '<div class="lyric-line-group active"><div class="lyric-line-main">此歌曲暂无歌词</div></div>';
                }
            } catch (e) {
                lyricsArray = []; document.getElementById('lyric-container').innerHTML = '<div class="lyric-line-group active"><div class="lyric-line-main">歌词加载失败</div></div>';
            }
        }

        function parseLrc(lrcStr) {
            const result = [];
            lrcStr.split('\n').forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseFloat("0." + match[3]);
                    const text = match[4].replace(/\/\//g, '').trim(); 
                    if(text) result.push({ time, text });
                }
            });
            return result;
        }

        function syncLyric(currentTime) {
            if (lyricsArray.length === 0) return;
            let activeIndex = 0;
            for (let i = 0; i < lyricsArray.length; i++) {
                if (currentTime + 0.3 >= lyricsArray[i].time) activeIndex = i; else break;
            }
            document.querySelectorAll('.lyric-line-group').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`lrc-${activeIndex}`);
            if (activeEl) {
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // --- 8. MV 影院模式 ---
        async function playMV(vid, title) {
            if(isPlaying) togglePlay(); // 播放 MV 前先暂停音乐
            const modal = document.getElementById('mv-modal');
            const video = document.getElementById('mv-video');
            document.getElementById('mv-title').innerText = title + ' - 官方 MV';
            modal.classList.add('show');
            
            try {
                // 根据文档，请求 mp4 格式以确保浏览器原生兼容性
                const res = await fetch(`${API_BASE}/mv?vid=${vid}&type=mp4`); 
                const json = await res.json();
                if(json.code === 200 && json.data && json.data.urls && json.data.urls.length > 0) {
                    // 取最高画质（通常数组最后一个体积最大、画质最高）
                    const bestUrl = json.data.urls[json.data.urls.length - 1].url;
                    video.src = bestUrl;
                    video.play();
                } else {
                    alert('获取 MV 源失败，请稍后再试。');
                    closeMV();
                }
            } catch(e) {
                alert('网络请求错误，无法播放 MV。');
                closeMV();
            }
        }

        function closeMV() {
            const modal = document.getElementById('mv-modal');
            const video = document.getElementById('mv-video');
            video.pause();
            video.src = "";
            modal.classList.remove('show');
        }
    </script>
</body>
